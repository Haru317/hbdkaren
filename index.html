<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Karen & Theo: High-End Layered Animation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* 🎨 シーン全体のコンテナ */
        #scene-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* 🌏 レイヤー1：背景 (scene1_bg.png) */
        #background {
            position: absolute; width: 100%; height: 100%;
            background: url('./scene1_bg.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
            /* 背景もゆっくり動かして「息づかい」を出す */
            animation: bg-breathe 10s infinite alternate ease-in-out;
        }

        /* 👤 レイヤー2：Karen (scene1_karen.png) */
        #karen {
            position: absolute; bottom: 15%; left: 40%;
            width: 300px; height: auto; z-index: 10;
            animation: char-float 3s infinite alternate ease-in-out;
        }

        /* 👦 レイヤー3：Theo (scene1_theo.png) */
        #theo {
            position: absolute; bottom: 10%; left: 55%;
            width: 220px; height: auto; z-index: 11;
            animation: char-float 2.5s infinite alternate-reverse ease-in-out;
        }

        @keyframes bg-breathe {
            from { transform: scale(1.0); }
            to { transform: scale(1.05); }
        }

        @keyframes char-float {
            from { transform: translateY(0) rotate(-1deg); }
            to { transform: translateY(-15px) rotate(1deg); }
        }

        /* UI */
        #ui { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 100; }
        button {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="scene-container">
    <div id="background"></div>
    <img src="./scene1_karen.png" id="karen" alt="Karen">
    <img src="./scene1_theo.png" id="theo" alt="Theo">
</div>

<div id="ui">
    <button onclick="nextScene()">Go to Next Scene</button>
</div>

<script>
    function nextScene() {
        // ここでシーン2の画像に差し替える処理を書く
        alert("画像を保存してリポジトリに入れたら、次のシーンのプロンプトをお出しします！");
    }
</script>

</body>
</html>
